name: Nepal Najar Scraper

on:
  schedule:
    # Twice daily: ~8:45 AM and ~8:45 PM Nepal Time (UTC+5:45)
    - cron: '0 3,15 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_URL: ${{ secrets.VERCEL_URL }}
      AUTH: "Bearer ${{ secrets.SCRAPE_SECRET }}"

    steps:
      - name: Scrape Kathmandu Post
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "kathmandu-post", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ kathmandu-post failed"
          sleep 2

      - name: Scrape Online Khabar
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "online-khabar", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ online-khabar failed"
          sleep 2

      - name: Scrape MyRepublica
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "republica", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ republica failed"
          sleep 2

      - name: Scrape Himalayan Times
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "himalayan-times", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ himalayan-times failed"
          sleep 2

      - name: Scrape Nepali Times
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "nepali-times", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ nepali-times failed"
          sleep 2

      - name: Scrape Ministry of Finance
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "mof-gov", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ mof-gov failed"
          sleep 2

      - name: Scrape Ministry of Infrastructure
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "mopit-gov", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ mopit-gov failed"
          sleep 2

      - name: Scrape Ministry of Urban Development
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moud-gov", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ moud-gov failed"
          sleep 2

      - name: Scrape Ministry of Energy
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moewri-gov", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ moewri-gov failed"
          sleep 2

      - name: Scrape Ministry of Home Affairs
        run: |
          curl -sf -X POST "$API_URL/api/scrape/source" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moha-gov", "trigger": "github_actions"}' \
            --max-time 15 || echo "⚠️ moha-gov failed"
          sleep 2

      - name: Run Promise Matcher
        run: |
          curl -sf -X POST "$API_URL/api/scrape/match" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            --max-time 30 || echo "⚠️ matcher failed"

      - name: Revalidate Frontend Cache
        run: |
          curl -sf -X POST "$API_URL/api/revalidate" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"paths": ["/", "/explore", "/report-card", "/daily"]}' \
            --max-time 10 || echo "⚠️ revalidation failed"

      - name: Summary
        run: |
          echo "✅ Scraping pipeline complete"
          echo "🕐 $(date -u '+%Y-%m-%d %H:%M UTC')"
