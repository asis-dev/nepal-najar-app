name: Nepal Najar Scraper

on:
  schedule:
    # Twice daily: ~8:45 AM and ~8:45 PM Nepal Time (UTC+5:45)
    - cron: '0 3,15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scraping mode'
        required: false
        default: 'deep'
        type: choice
        options:
          - deep
          - headlines-only

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_URL: ${{ secrets.VERCEL_URL }}
      AUTH: "Bearer ${{ secrets.SCRAPE_SECRET }}"
      # Use /api/scrape/deep for AI-powered full analysis
      # Falls back to keyword matching if AI_BASE_URL not set in Vercel
      ENDPOINT: "/api/scrape/deep"

    steps:
      - name: Deep Scrape — Kathmandu Post
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "kathmandu-post", "trigger": "github_actions", "maxArticles": 5}' \
            --max-time 60 || echo "⚠️ kathmandu-post failed"
          sleep 3

      - name: Deep Scrape — Online Khabar
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "online-khabar", "trigger": "github_actions", "maxArticles": 5}' \
            --max-time 60 || echo "⚠️ online-khabar failed"
          sleep 3

      - name: Deep Scrape — MyRepublica
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "republica", "trigger": "github_actions", "maxArticles": 5}' \
            --max-time 60 || echo "⚠️ republica failed"
          sleep 3

      - name: Deep Scrape — Himalayan Times
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "himalayan-times", "trigger": "github_actions", "maxArticles": 5}' \
            --max-time 60 || echo "⚠️ himalayan-times failed"
          sleep 3

      - name: Deep Scrape — Nepali Times
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "nepali-times", "trigger": "github_actions", "maxArticles": 5}' \
            --max-time 60 || echo "⚠️ nepali-times failed"
          sleep 3

      - name: Deep Scrape — Ministry of Finance
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "mof-gov", "trigger": "github_actions", "maxArticles": 3}' \
            --max-time 60 || echo "⚠️ mof-gov failed"
          sleep 3

      - name: Deep Scrape — Ministry of Infrastructure
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "mopit-gov", "trigger": "github_actions", "maxArticles": 3}' \
            --max-time 60 || echo "⚠️ mopit-gov failed"
          sleep 3

      - name: Deep Scrape — Ministry of Urban Development
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moud-gov", "trigger": "github_actions", "maxArticles": 3}' \
            --max-time 60 || echo "⚠️ moud-gov failed"
          sleep 3

      - name: Deep Scrape — Ministry of Energy
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moewri-gov", "trigger": "github_actions", "maxArticles": 3}' \
            --max-time 60 || echo "⚠️ moewri-gov failed"
          sleep 3

      - name: Deep Scrape — Ministry of Home Affairs
        run: |
          curl -sf -X POST "$API_URL$ENDPOINT" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"source": "moha-gov", "trigger": "github_actions", "maxArticles": 3}' \
            --max-time 60 || echo "⚠️ moha-gov failed"
          sleep 2

      - name: Revalidate Frontend Cache
        run: |
          curl -sf -X POST "$API_URL/api/revalidate" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"paths": ["/", "/explore", "/report-card", "/daily"]}' \
            --max-time 10 || echo "⚠️ revalidation failed"

      - name: Summary
        run: |
          echo "✅ Deep scraping pipeline complete"
          echo "🕐 $(date -u '+%Y-%m-%d %H:%M UTC')"
